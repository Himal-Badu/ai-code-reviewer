Automated AI-powered code review tool for detecting bugs, security issues, and code quality improvements.

## Quick Start

```bash
# Install
pip install ai-code-reviewer

# Review code
ai-reviewer review /path/to/your/code

# Security scan
ai-reviewer scan /path/to/your/code
```

## Features

- 🔍 Bug detection
- 🛡️ Security scanning
- 📊 Code quality analysis
- 🤖 AI-powered insights
- 🌐 Multi-language support
- 📈 Detailed reports

